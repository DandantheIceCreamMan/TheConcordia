<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event – UATX Concordia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <h1 class="site-title">UATX Concordia</h1>
          <p class="tagline">Society & events at the heart of campus</p>
        </div>
        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="events.html">Upcoming Events</a>
          <a href="propose.html">Propose an Event</a>
          <a href="polls.html">Polls</a>
          <a href="newsletter.html">Newsletter</a>
          <a href="index.html#join">Join & Contact</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="section">
        <div class="container">
          <p class="back-link"><a href="events.html">← All events</a></p>
          <div id="event-detail">
            <!-- Filled by JavaScript -->
            <p class="loading">Loading event…</p>
          </div>
          <div id="event-rsvp-area" class="event-rsvp-area" hidden>
            <h3>RSVP</h3>
            <form id="rsvp-form">
              <div class="form-row">
                <label for="rsvp-name">Name</label>
                <input id="rsvp-name" name="name" type="text" required />
              </div>
              <div class="form-row">
                <label for="rsvp-email">Email</label>
                <input id="rsvp-email" name="email" type="email" required />
              </div>
              <button type="submit">I'm in</button>
              <p id="rsvp-message" class="form-message"></p>
            </form>
          </div>
          <div id="event-share-area" class="event-share-area" hidden>
            <h3>Share this event</h3>
            <p class="event-share-hint">Send this link to a friend so they can see the event and RSVP.</p>
            <div class="share-link-box">
              <input type="text" id="share-url" readonly aria-label="Shareable event URL" />
              <button type="button" id="copy-share-btn" class="copy-btn">Copy link</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p class="copyright">
          &copy; <span id="year"></span> UATX Concordia
          · <a href="index.html">Home</a> · <a href="index.html#join">Join & Contact</a>
        </p>
      </div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
